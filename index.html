<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>zeroOS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="https://i.imgur.com/126nI80.png">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Open+Sans:wght@300..800&display=swap');

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Segoe UI", "Open Sans", sans-serif;
  user-select: none;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background-color: #1a1a1a;
  cursor: url(https://i.imgur.com/MXhbAGY.png), default!important;
}

/* ===================== DESKTOP ===================== */
#desktop {
  width: 100%;
  height: 100%;
  background: url("https://glacier.webmc.xyz/windows/wallpaper1.webp") center/cover no-repeat;
  position: relative;

  display: flex;
  flex-wrap: wrap;        
  align-content: flex-start; 
  gap: 20px;

  padding: 20px;
  box-sizing: border-box;
  cursor: url(https://i.imgur.com/MXhbAGY.png), default!important;
}


/* =====================
 TASKBAR
  ===================== */
#taskbar {
  cursor: url(https://i.imgur.com/MXhbAGY.png), default!important;
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 60px;
  background: rgba(20, 20, 20, 0.75);
  backdrop-filter: blur(20px);
  display: flex;
  align-items: center;
  justify-content: space-between; 
  z-index: 100;
  padding: 0 15px; 
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  cursor: url(https://i.imgur.com/MXhbAGY.png), default!important;
}  

#taskbar-inner {
  display: flex;
  gap: 14px;
  cursor: url(https://i.imgur.com/MXhbAGY.png), default!important;
}

.cloak-btn {
  width: 180px;
  height: 40px;
  border-radius: 6px;
  background: rgba(255,255,255,0.15);
  display: flex;
  align-items: center;
  text-align: center;
  justify-content: center;
  cursor: url(https://i.imgur.com/Kp1oxMB.png), pointer!important;
  transition: background 0.2s;
  font-weight: bold;
}

.cloak-btn:hover {
  background: rgba(255,255,255,0.35);
}

.taskbar-icon {
  width: 46px;
  height: 46px;
  /* used to be 36 */
  border-radius: 6px;
  /* background: rgba(255,255,255,0.15); */
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: url(https://i.imgur.com/Kp1oxMB.png), pointer!important;
  transition: background 0.2s;
}

.taskbar-icon img {
  /* used to be 26 */
  width: 34px;
  height: 34px;
}

.taskbar-icon:hover {
  background: rgba(255,255,255,0.35);
}

/* ===================== START MENU ===================== */
#start-menu {
  position: absolute;
  bottom: 60px;
  left: 50%;
  transform: translateX(-50%);
  width: 420px;
  height: 520px;
  background: rgba(30,30,30,0.85);
  backdrop-filter: blur(25px);
  border-radius: 12px;
  padding: 20px;
  display: none;
  color: white;
  z-index: 90;
  transition: 0.3s all ease;
}

/* ===================== WINDOWS ===================== */
.window {
  position: absolute;
  width: 800px;
  height: 500px;
  background: #111;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 20px 50px rgba(0,0,0,0.6);
  transform: scale(0.3);
  opacity: 0;
  transition: transform 0.18s ease, opacity 0.18s ease;
}

.window.open {
  transform: scale(1);
  opacity: 1;
}

.window.closing {
  transform: scale(0.3);
  opacity: 0;
}

.title-bar {
  height: 36px;
  background: rgba(255,255,255,0.05);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 10px;
  color: white;
}

.maximize-button {
  margin-left: auto;
  margin-right: 10px;
  cursor: url(https://i.imgur.com/Kp1oxMB.png), pointer!important;
  size: 12px;
}

.maximize-button img {
    max-width: 50%; 
    height: 20px;   
    width: 40px;     
    display: block; 
    margin: auto;    
}

.window-content {
  width: 100%;
  height: calc(100% - 36px);
}
    
    .window-content embed {
  width: 100%;
  height: calc(100% - 36px);
}


/* ===================== STORE ===================== */
.store {
  display: flex;
  height: 100%;
  color: white;
  transition: 0.2s all ease;
}

/* Sidebar (icons only) */
.store-sidebar {
  width: 60px;
  background: rgba(255,255,255,0.05);
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  align-items: center;
}

.store-sidebar button {
  width: 40px;
  height: 40px;
  border-radius: 10px;
  background: rgba(255,255,255,0.15);
  border: none;
  font-size: 22px;
  cursor: url(https://i.imgur.com/Kp1oxMB.png), pointer!important;
  color: white;
  transition: background 0.2s;
}

.store-sidebar button:hover,
.store-sidebar button.active {
  background: rgba(255,255,255,0.35);
}

.store-content {
  flex: 1;
  padding: 16px;
  overflow-y: scroll;
}

#store-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 16px;
  justify-content: start;
  align-items: start;
}

/* Apps/games/devtools from the store 🤓 */
.store-item {
  /* aspect-ratio: 9 / 9; */
  width: 60%;
  max-width: 220px;
  height: 130px;

  background: rgba(255,255,255,0.12);
  border-radius: 12px;
  padding: 12px;

  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  justify-content: center;

  position: relative;
  cursor: url(https://i.imgur.com/Kp1oxMB.png), pointer!important;
  transition: background 0.2s;
  font-size: 12px;
}

.store-item:hover {
  background: rgba(255,255,255,0.35);
}

.store-item img {
  width: 64px;
  height: 64px;
  /* was 48px */
  margin-bottom: 8px;
}

.pin-button {
  position: absolute;
  top: 6px;
  right: 6px;
  width: 22px;
  height: 22px;
  border-radius: 8px;
  background: rgba(33, 155, 12, 0.98);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  cursor: url(https://i.imgur.com/Kp1oxMB.png), pointer!important;
  transition: all 0.2s;
}

.pin-button.pinned {
  background: red;
}

.pin-button:hover {
  background: rgba(13, 136, 52, 0.99);
}

.desktop-icon {
  width: 72px;          
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;

  color: white;
  font-size: 12px;
  cursor: url(https://i.imgur.com/Kp1oxMB.png), pointer!important;
  text-align: center;
}


.desktop-icon img {
  width: 48px;
  height: 48px;
  object-fit: contain;
}

.overlay {
    display: none; 
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    z-index: 1000;
    /* justify-content: center; */
    align-items: center;
}
.popup-box {
    position: absolute;
    top: 0;
    right: 0;
    background: #333;
    padding: 30px;
    border-radius: 12px; 
    /* position: relative; */
    max-width: 400px;
    height: 200px;
    color: white;
    border: 2px solid #0078D4; 
    box-shadow: 0 0 15px rgba(0, 120, 212, 0.6);
}
.close-btn {
    position: absolute;
    top: 10px;
    right: 15px;
    border: none;
    background: none;
    font-size: 24px;
    cursor: url(https://i.imgur.com/Kp1oxMB.png), pointer!important;
    color: white; 
}
.checkbox-container {
    margin-top: 20px;
    font-size: 14px;
    cursor: url(https://i.imgur.com/Kp1oxMB.png), pointer!important;
}
.checkbox-container:hover {
  cursor: url(https://i.imgur.com/Kp1oxMB.png), pointer!important;
}

#system-tray {
  display: flex;
  align-items: center;
  color: white;
  min-width: 120px; 
  width: auto;
  justify-content: flex-end;
  cursor: url(https://i.imgur.com/MXhbAGY.png), default!important;
}

#clock-container {
  text-align: right;
  padding: 6px 10px;
  border-radius: 8px;
  transition: background 0.2s;
}

#clock-container:hover {
  background: rgba(255, 255, 255, 0.15);
}

#taskbar-time {
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 0.5px;
  margin-right: 15px;
}

#taskbar-date {
  font-size: 12px;
  opacity: 0.85;
  margin-top: 1px;
  margin-right: 15px;
}

.factory-btn {
  background: #222;
  border: 2px solid #d93025;
  color:white; 
  padding:10px 20px; 
  border-radius:5px; 
  cursor: url(https://i.imgur.com/Kp1oxMB.png), pointer!important; 
  font-weight:bold;
  transition: 0.2s all ease;
}

.factory-btn:hover {
  background: #d93025; 
}

#info-popup::after {
    content: "";
    position: absolute;
    top: 100%;
    right: 5px;
    border-width: 5px;
    border-style: solid;
    border-color: #0078D4 transparent transparent transparent;
}

    bottom: 0;

    height: 2px;
    background: #0078D4; 
    transition: width 0.3s ease, left 0.3s ease;
    pointer-events: none;

.modal-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: flex; align-items: center;
    justify-content: center; z-index: 100000;
}
.app-modal {
    width: 380px; background: #202020; border-radius: 12px;
    border: 1px solid #333; box-shadow: 0 20px 60px rgba(0,0,0,0.7);
    color: white; font-family: 'Segoe UI Variable', sans-serif; overflow: hidden;
}
.modal-input-group {
    position: relative; margin-bottom: 20px;
}
.modal-input-group input {
    width: 100%; padding: 12px; background: #2b2b2b; color: white;
    border: none; border-bottom: 2px solid #444; outline: none; box-sizing: border-box;
}
.modal-input-group::after {
    content: ""; position: absolute; bottom: 0; left: 50%;
    width: 0; height: 2px; background: #0078D4; transition: 0.3s ease;
}
.modal-input-group:focus-within::after {
    width: 100%; left: 0;
}

/* The Active Indicator (Windows 11 Style) */
.taskbar-icon {
    position: relative; /* Essential to anchor the line */
}

.taskbar-icon.active::after {
    content: "";
    position: absolute;
    bottom: 2px;
    left: 50%;
    transform: translateX(-50%);
    width: 6px; /* Small pill shape */
    height: 3px;
    background-color: #0078D4; /* Windows Accent Blue */
    border-radius: 2px;
    transition: width 0.2s ease;
}

/* Optional: Make it slightly wider if the window is currently focused */
.taskbar-icon.focused::after {
    width: 12px;
}

function showTooltip(element, text) {
  const existing = document.querySelector(".taskbar-tooltip");
  if (existing) existing.remove();

  const tooltip = document.createElement("div");
  tooltip.className = "taskbar-tooltip";
  tooltip.innerText = text;
  document.body.appendChild(tooltip);

  const rect = element.getBoundingClientRect();
  const x = rect.left + rect.width / 2;
  tooltip.style.left = `${x}px`;

  requestAnimationFrame(() => {
    tooltip.classList.add("visible");
  });

  element.onmouseleave = () => {
    tooltip.classList.remove("visible");
    setTimeout(() => tooltip.remove(), 150);
  };
}

function updateBattery() {
  if (!navigator.getBattery) return;

  navigator.getBattery().then(battery => {
    const hiddenSpan = document.getElementById("battery-percent-hidden");
    const iconElem = document.getElementById("battery-icon");

    const refresh = () => {
      const level = Math.round(battery.level * 100);
      const levelText = level + "%";

      if (hiddenSpan) hiddenSpan.innerText = levelText;

      if (battery.charging) {
        iconElem.src = "https://i.imgur.com/uTPQgsO.png";
        iconElem.style.width = "30px";
      } else if (level <= 20) {
        iconElem.src = "https://i.imgur.com/shV5AQC.png";
        iconElem.style.width = "30px";
      } else {
        iconElem.src = "https://i.imgur.com/P9mPg7G.png";
        iconElem.style.width = "30px";
      }
    };

    refresh();
    battery.onlevelchange = refresh;
    battery.onchargingchange = refresh;
  });
}

/* ============================

   ============================ */

let dragData = null;

document.addEventListener("mousemove", e => {
  if (!dragData) return;

  dragData.win.style.left = e.clientX - dragData.offsetX + "px";
  dragData.win.style.top = e.clientY - dragData.offsetY + "px";
});

document.addEventListener("mouseup", () => {
  dragData = null;
});

function makeWindowDraggable(win) {
  const titleBar = win.querySelector(".title-bar");
  if (!titleBar) return;

  titleBar.addEventListener("mousedown", e => {
    if (win.dataset.maximized === "true") return;
    if (e.target.closest(".maximize-button")) return;
    if (e.target.textContent === "✕") return;

    win.style.zIndex = z++;

    const rect = win.getBoundingClientRect();
    dragData = {
      win,
      offsetX: e.clientX - rect.left,
      offsetY: e.clientY - rect.top
    };
  });
}

/* ============================
   WINDOW MANAGEMENT
   ============================ */

function openApp(title, url) {
  if (openWindows[title]) {
    closeWindow(openWindows[title], title);
    return;
  }

  const win = document.createElement("div");
  win.className = "window";
  win.dataset.maximized = "false";
  win.style.top = "100px";
  win.style.left = "100px";
  win.style.zIndex = z++;

  win.innerHTML = `
    <div class="title-bar">
      <span>${title}</span>
      <div class="maximize-button" onclick="toggleMaximize('${title}')"><img src="https://i.imgur.com/iigug37.png"></div>
      <div style="cursor: url(https://i.imgur.com/Kp1oxMB.png), pointer!important;" onclick="closeWindow(this.parentElement.parentElement,'${title}')">✕</div>
    </div>
    <div class="window-content">
      <embed src="${url}">
    </div>
  `;

  document.getElementById("desktop").appendChild(win);
  openWindows[title] = win;

  makeWindowDraggable(win);

  win.offsetHeight;
  win.classList.add("open");
}

function closeWindow(win, title) {
  win.classList.remove("open");
  win.classList.add("closing");

  setTimeout(() => {
    win.remove();
    delete openWindows[title];
  }, 180);
}

function toggleMaximize(title) {
  
  const win = openWindows[title];
  if (!win) return;

  const maximized = win.dataset.maximized === "true";

  if (maximized) {
    win.style.top = "100px";
    win.style.left = "100px";
    win.style.width = "800px";
    win.style.height = "500px";
    win.dataset.maximized = "false";
  } else {
    win.style.top = "0";
    win.style.left = "0";
    win.style.width = "100%";
    win.style.height = "100%";
    win.dataset.maximized = "true";
  }
  
}

function toggleInfo(event) {

    } else {
        popup.style.display = 'none';
    }
}

async function OfflineDownload() {
    const btn = document.getElementById('dlBtn');
    const url = 'https://raw.githubusercontent.com/redtide-stack/zeroOS/refs/heads/main/index.html';
    
    btn.disabled = true;
    btn.innerText = 'Fetching...';

    try {
        const response = await fetch(url);
        if (!response.ok) throw new Error('Network error');
        
        const blob = await response.blob();

        const downloadUrl = window.URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = downloadUrl;
        link.download = 'ZeroOS Offline.html'; 
        
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        window.URL.revokeObjectURL(downloadUrl);

        btn.innerText = 'Download completed, open file from your recent downloads folder';
    } catch (error) {
        console.error('Download failed:', error);
        btn.innerText = 'Error Downloading';
    } finally {
        setTimeout(() => {
            btn.disabled = false;
            btn.innerText = 'Download ZeroOS Offline';
        }, 3000);
    }
}

function exportData() {
    const data = JSON.stringify(localStorage);
    const blob = new Blob([data], { type: "application/json" });
    const url = window.URL.createObjectURL(blob);
    const a = document.createElement("a");
    
    a.style.display = "none";
    a.href = url;
    a.download = "zeroOS_backup.json";
    
    document.body.appendChild(a);
    a.click();
    
    window.URL.revokeObjectURL(url);
    document.body.removeChild(a);
}

function importData() {
    const input = document.createElement("input");
    input.type = "file";
    input.accept = ".json";
    input.onchange = e => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = event => {
            try {
                const data = JSON.parse(event.target.result);
                localStorage.clear();
                Object.keys(data).forEach(key => localStorage.setItem(key, data[key]));
                alert("Import successful, reloading the site");
                location.reload();
            } catch (err) { alert("Invalid backup file."); }
        };
        reader.readAsText(file);
    };
    input.click();
}
